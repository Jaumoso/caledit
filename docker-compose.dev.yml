services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calendapp
      POSTGRES_USER: calendapp
      POSTGRES_PASSWORD: calendapp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/Dockerfile.backend.dev
    environment:
      - DATABASE_URL=postgresql://calendapp:calendapp_password@postgres:5432/calendapp?schema=public
      - NODE_ENV=development
      - COOKIE_SECRET=dev-secret-key
      - JWT_SECRET=dev-jwt-secret-key
      - UPLOAD_PATH=/data/uploads
      - EXPORT_PATH=/data/exports
    volumes:
      - ./apps/backend:/app
      - ./packages/shared:/app/packages/shared
      - ./data:/data
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm dev

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../../docker/Dockerfile.frontend.dev
    volumes:
      - ./apps/frontend:/app
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    ports:
      - "5173:5173"
    command: pnpm dev

volumes:
  postgres_data: